<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="HashChat logo">
  <defs>
    <linearGradient id="hc-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="0.55" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="hc-shine" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="0.6" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Tile -->
  <rect width="64" height="64" rx="16" fill="url(#hc-bg)"/>
  <rect width="64" height="64" rx="16" fill="url(#hc-shine)"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="15.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.18"/>

  <!-- Italic hashtag (skewed group) -->
  <g transform="translate(32 33) skewX(-10) translate(-32 -33)" fill="#FFFFFF">
    <!-- vertical bars -->
    <rect x="22"  y="14" width="5"  height="38" rx="2.5"/>
    <rect x="36"  y="14" width="5"  height="38" rx="2.5"/>
    <!-- horizontal bars -->
    <rect x="13"  y="23" width="38" height="5"  rx="2.5"/>
    <rect x="13"  y="38" width="38" height="5"  rx="2.5"/>
  </g>

  <!-- Chat-bubble tail at bottom-right -->
  <path d="M48 50 L56 58 L52 50 Z" fill="#FFFFFF"/>

  <!-- Tiny sparkle -->
  <circle cx="51" cy="14" r="2" fill="#FFFFFF" fill-opacity="0.9"/>
  <circle cx="51" cy="14" r="3.5" fill="#FFFFFF" fill-opacity="0.25"/>
</svg>
