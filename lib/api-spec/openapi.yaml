        imageUrl:
          type: ["string", "null"]
        imageAlt:
          type: ["string", "null"]
        audioUrl:
          type: ["string", "null"]
        audioWaveform:
          type: ["array", "null"]
          items:
            type: integer
            minimum: 0
            maximum: 100
        gifUrl:
