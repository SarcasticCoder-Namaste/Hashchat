        isPrivate: { type: boolean }
        isMember: { type: boolean }
      required: [tag, memberCount, messageCount, followerCount, recentMessages, isFollowed, isPrivate, isMember]

    OverviewStats:
      type: object
      properties:
        userCount: { type: integer }
        hashtagCount: { type: integer }
        messageCount: { type: integer }
        roomCount: { type: integer }
      required: [userCount, hashtagCount, messageCount, roomCount]

    AdminUser:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        status: { type: string }
        featuredHashtag:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        role: { type: string }
        mvpPlan: { type: boolean }
        verified: { type: boolean }
        lastSeenAt: { type: string, format: date-time }
        presenceState:
          type: string
          enum: [online, away, offline]
          description: "Derived presence state — 'online' if active in the last 60s, 'away' within 10 min, otherwise 'offline'. Always 'offline' for users who hide their presence."
        currentRoomTag:
          type: ["string", "null"]
          description: "Hashtag of the room the user is currently active in, if any. Null when hidden or not in a room."
        bannedAt:
          type: ["string", "null"]
          format: date-time
        createdAt: { type: string, format: date-time }
      required: [id, username, displayName, status, role, mvpPlan, verified, lastSeenAt, createdAt]

    SetRoleBody:
      type: object
      properties:
        role: { type: string, enum: [user, moderator, admin] }
      required: [role]

    RedeemCodeBody:
      type: object
      properties:
        code: { type: string }
      required: [code]

    OkResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]

    SearchUserHit:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        avatarUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        verified: { type: boolean }
        mvpPlan: { type: boolean }
      required: [id, username, displayName, verified, mvpPlan]

    SearchHashtagHit:
      type: object
      properties:
        tag: { type: string }
        memberCount: { type: integer }
        messageCount: { type: integer }
        followerCount: { type: integer }
      required: [tag, memberCount, messageCount, followerCount]

    SearchRoomHit:
      type: object
      properties:
        tag: { type: string }
        memberCount: { type: integer }
        messageCount: { type: integer }
        followerCount: { type: integer }
        recentMessages: { type: integer }
        isPrivate: { type: boolean }
        isMember: { type: boolean }
      required: [tag, memberCount, messageCount, followerCount, recentMessages, isPrivate, isMember]

    SearchPostHit:
      type: object
      properties:
        id: { type: integer }
        author: { $ref: "#/components/schemas/PostAuthor" }
        content: { type: string }
        snippet: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, author, content, snippet, createdAt]

    SearchMessageHit:
      type: object
      properties:
        id: { type: integer }
        senderName: { type: string }
        senderUsername: { type: string }
        senderAvatarUrl:
          type: ["string", "null"]
        content: { type: string }
        snippet: { type: string }
        roomTag:
          type: ["string", "null"]
