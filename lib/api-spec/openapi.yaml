        - { name: limit, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SearchResults" }

  /me/bookmarks:
    get:
      operationId: getMyBookmarks
      tags: [bookmarks]
      summary: List my bookmarks (saved messages and posts)
      parameters:
        - name: kind
          in: query
          required: false
          schema:
            type: string
            enum: [all, message, post]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Bookmark" }
    post:
      operationId: createBookmark
      tags: [bookmarks]
      summary: Save a message or post (with an optional private note)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateBookmarkBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Bookmark" }

  /me/bookmarks/check:
    get:
      operationId: checkBookmark
      tags: [bookmarks]
      summary: Check if a target is bookmarked
      parameters:
        - name: kind
          in: query
          required: true
          schema: { type: string, enum: [message, post] }
        - name: targetId
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BookmarkCheck" }

  /me/bookmarks/{id}:
    patch:
      operationId: updateBookmark
      tags: [bookmarks]
      summary: Update a bookmark's private note
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateBookmarkBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Bookmark" }
    delete:
      operationId: deleteBookmark
      tags: [bookmarks]
      summary: Remove a bookmark
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No content }

  /me/preferences:
    get:
      operationId: getMyPreferences
      tags: [preferences]
      summary: Get my server-side preferences (theme, accent, notification channels)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserPreferences" }
    put:
      operationId: updateMyPreferences
      tags: [preferences]
      summary: Update my server-side preferences
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePreferencesBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserPreferences" }

  /push/vapid-public-key:
    get:
      operationId: getVapidPublicKey
      tags: [push]
      summary: Get the server's VAPID public key for browser push subscriptions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VapidKeyResponse" }

  /push/subscribe:
    post:
      operationId: subscribePush
      tags: [push]
      summary: Register a browser Web Push subscription
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PushSubscribeBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }

  /push/unsubscribe:
    post:
      operationId: unsubscribePush
      tags: [push]
      summary: Remove a browser Web Push subscription
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PushUnsubscribeBody" }
      responses:
        "204": { description: No content }

  /me/wallets/challenge:
    post:
      operationId: createWalletChallenge
      tags: [wallets]
      summary: Start the wallet linking flow by requesting a sign-in nonce
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WalletChallengeBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WalletChallengeResponse" }

  /me/wallets/verify:
    post:
      operationId: verifyWalletChallenge
      tags: [wallets]
      summary: Verify a signed wallet challenge and link the wallet
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WalletVerifyBody" }
      responses:
        "200":
          description: Wallet was already linked
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SolanaWallet" }
        "201":
          description: Wallet linked
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SolanaWallet" }

  /me/wallets:
    get:
      operationId: listMyWallets
      tags: [wallets]
      summary: List my linked Solana wallets
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WalletListResponse" }

  /me/wallets/{id}:
    delete:
      operationId: unlinkMyWallet
      tags: [wallets]
      summary: Unlink one of my Solana wallets
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No content }

  /me/wallets/{id}/primary:
    post:
      operationId: setPrimaryWallet
      tags: [wallets]
      summary: Mark one of my wallets as the primary one
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SolanaWallet" }

  /users/{id}/wallets:
    get:
      operationId: getUserWallets
      tags: [wallets]
      summary: Get the public wallet list for any user
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WalletListResponse" }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    User:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        pronouns:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        statusEmoji:
          type: ["string", "null"]
        statusText:
          type: ["string", "null"]
        status: { type: string }
        featuredHashtag:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        friendCode:
          type: ["string", "null"]
        role: { type: string }
        mvpPlan: { type: boolean }
        verified: { type: boolean }
        premiumUntil:
          type: ["string", "null"]
          format: date-time
        lastSeenAt: { type: string, format: date-time }
        hashtags:
          type: array
          items: { type: string }
        followedHashtags:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, username, displayName, status, role, mvpPlan, verified, lastSeenAt, hashtags, followedHashtags, createdAt]

    UpdateUserBody:
      type: object
      properties:
        displayName: { type: string }
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        pronouns:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        statusEmoji:
          type: ["string", "null"]
        statusText:
          type: ["string", "null"]
        status: { type: string }
        featuredHashtag:
          type: ["string", "null"]

    SetHashtagsBody:
      type: object
      properties:
        hashtags:
          type: array
          items: { type: string }
      required: [hashtags]

    Hashtag:
      type: object
      properties:
        tag: { type: string }
        memberCount: { type: integer }
        messageCount: { type: integer }
        followerCount: { type: integer }
      required: [tag, memberCount, messageCount, followerCount]

    TrendingHashtag:
      type: object
      properties:
        tag: { type: string }
        memberCount: { type: integer }
        messageCount: { type: integer }
        followerCount: { type: integer }
        recentMessages: { type: integer }
        score: { type: number }
      required: [tag, memberCount, messageCount, followerCount, recentMessages, score]

    HashtagDetail:
      type: object
      properties:
        tag: { type: string }
        memberCount: { type: integer }
        messageCount: { type: integer }
        followerCount: { type: integer }
        recentMessages: { type: integer }
        isFollowed: { type: boolean }
        isPrivate: { type: boolean }
        isMember: { type: boolean }
        ownerId:
          type: ["string", "null"]
        topMembers:
          type: array
          items: { $ref: "#/components/schemas/MatchUser" }
        relatedHashtags:
          type: array
          items: { type: string }
      required: [tag, memberCount, messageCount, followerCount, recentMessages, isFollowed, isPrivate, isMember, topMembers, relatedHashtags]

    MatchUser:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        status: { type: string }
        featuredHashtag:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        role: { type: string }
        mvpPlan: { type: boolean }
        verified: { type: boolean }
        lastSeenAt: { type: string, format: date-time }
        hashtags:
          type: array
          items: { type: string }
        sharedHashtags:
          type: array
          items: { type: string }
        matchScore: { type: number }
        friendStatus:
          type: ["string", "null"]
          description: "One of: friends, request_sent, request_received, none"
        isFollowing: { type: boolean }
        followsMe: { type: boolean }
        isMuted: { type: boolean }
        isBlocked: { type: boolean }
      required: [id, username, displayName, status, role, mvpPlan, verified, lastSeenAt, hashtags, sharedHashtags, matchScore]

    FriendCodeResponse:
      type: object
      properties:
        friendCode:
          type: ["string", "null"]
      required: [friendCode]

    PublicProfile:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        pronouns:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        statusEmoji:
          type: ["string", "null"]
        statusText:
          type: ["string", "null"]
        status: { type: string }
        featuredHashtag:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        role: { type: string }
        mvpPlan: { type: boolean }
        verified: { type: boolean }
        lastSeenAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        hashtags:
          type: array
          items: { type: string }
        mutualHashtags:
          type: array
          items: { type: string }
        followerCount: { type: integer }
        followingCount: { type: integer }
        isFollowing: { type: boolean }
        followsMe: { type: boolean }
        isMuted: { type: boolean }
        isBlocked: { type: boolean }
        friendStatus:
          type: ["string", "null"]
      required:
        [id, username, displayName, status, role, mvpPlan, verified, lastSeenAt, createdAt,
         hashtags, mutualHashtags, followerCount, followingCount,
         isFollowing, followsMe, isMuted, isBlocked]

    MyRelationships:
      type: object
      properties:
        following:
          type: array
          items: { type: string }
        blocked:
          type: array
          items: { type: string }
        muted:
          type: array
          items: { type: string }
        mutedHashtags:
          type: array
          items: { type: string }
      required: [following, blocked, muted, mutedHashtags]

    BlocksAndMutesUser:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        avatarUrl:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        actedAt: { type: string, format: date-time }
      required: [id, username, displayName, actedAt]

    BlocksAndMutes:
      type: object
      properties:
        blocked:
          type: array
          items: { $ref: "#/components/schemas/BlocksAndMutesUser" }
        muted:
          type: array
          items: { $ref: "#/components/schemas/BlocksAndMutesUser" }
        mutedHashtags:
          type: array
          items:
            type: object
            properties:
              tag: { type: string }
              actedAt: { type: string, format: date-time }
            required: [tag, actedAt]
      required: [blocked, muted, mutedHashtags]

    FollowingFeedItem:
      type: object
      properties:
        kind: { type: string, enum: [post, room_join] }
        id: { type: string }
        user: { $ref: "#/components/schemas/MatchUser" }
        roomTag:
          type: ["string", "null"]
        content:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        createdAt: { type: string, format: date-time }
      required: [kind, id, user, createdAt]

    FriendRequestList:
      type: object
      properties:
        incoming:
          type: array
          items: { $ref: "#/components/schemas/MatchUser" }
        outgoing:
          type: array
          items: { $ref: "#/components/schemas/MatchUser" }
      required: [incoming, outgoing]

    Conversation:
      type: object
      properties:
        id: { type: integer }
        otherUser: { $ref: "#/components/schemas/MatchUser" }
        lastMessage:
          oneOf:
            - $ref: "#/components/schemas/Message"
            - type: "null"
        unreadCount: { type: integer }
        backgroundUrl:
          type: ["string", "null"]
        updatedAt: { type: string, format: date-time }
      required: [id, otherUser, unreadCount, updatedAt]

    SetBackgroundBody:
      type: object
      properties:
        backgroundUrl: { type: string }
      required: [backgroundUrl]

    UserPhoto:
      type: object
      properties:
        id: { type: integer }
        userId: { type: string }
        imageUrl: { type: string }
        caption:
          type: ["string", "null"]
        createdAt: { type: string, format: date-time }
      required: [id, userId, imageUrl, createdAt]

    AddPhotoBody:
      type: object
      properties:
        imageUrl: { type: string }
        caption:
          type: ["string", "null"]
      required: [imageUrl]

    UploadUrlRequest:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        size: { type: integer, minimum: 1 }
        contentType: { type: string, minLength: 1 }
      required: [name, size, contentType]

    UploadUrlResponse:
      type: object
      properties:
        uploadURL: { type: string, format: uri }
        objectPath: { type: string }
        metadata: { $ref: "#/components/schemas/UploadUrlRequest" }
      required: [uploadURL, objectPath]

    InitiateCallBody:
      type: object
      properties:
        kind: { type: string, enum: [voice, video] }
        conversationId:
          type: ["integer", "null"]
        roomTag:
          type: ["string", "null"]
      required: [kind]

    Call:
      type: object
      properties:
        id: { type: integer }
        initiatorId: { type: string }
        kind: { type: string }
        status: { type: string }
        conversationId:
          type: ["integer", "null"]
        roomTag:
          type: ["string", "null"]
        startedAt: { type: string, format: date-time }
        endedAt:
          type: ["string", "null"]
          format: date-time
        participants:
          type: array
          items: { $ref: "#/components/schemas/CallParticipant" }
      required: [id, initiatorId, kind, status, startedAt, participants]

    CallParticipant:
      type: object
      properties:
        userId: { type: string }
        username: { type: string }
        displayName: { type: string }
        avatarUrl:
          type: ["string", "null"]
        state: { type: string }
        joinedAt:
          type: ["string", "null"]
          format: date-time
      required: [userId, username, displayName, state]

    CallSignalBody:
      type: object
      properties:
        toUserId: { type: string }
        kind: { type: string, enum: [offer, answer, ice] }
        payload: { type: string }
      required: [toUserId, kind, payload]

    CallSignal:
      type: object
      properties:
        id: { type: integer }
        callId: { type: integer }
        fromUserId: { type: string }
        toUserId: { type: string }
        kind: { type: string }
        payload: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, callId, fromUserId, toUserId, kind, payload, createdAt]

    CallSignalList:
      type: object
      properties:
        signals:
          type: array
          items: { $ref: "#/components/schemas/CallSignal" }
        cursor: { type: integer }
      required: [signals, cursor]

    OpenConversationBody:
      type: object
      properties:
        userId: { type: string }
      required: [userId]

    Message:
      type: object
      properties:
        id: { type: integer }
        conversationId:
          type: ["integer", "null"]
        roomTag:
          type: ["string", "null"]
        senderId: { type: string }
        senderName: { type: string }
        senderAvatarUrl:
          type: ["string", "null"]
        content: { type: string }
        replyToId:
          type: ["integer", "null"]
        replyToContent:
          type: ["string", "null"]
        replyToSenderName:
          type: ["string", "null"]
        replyCount: { type: integer }
        imageUrl:
          type: ["string", "null"]
        audioUrl:
          type: ["string", "null"]
        reactions:
          type: array
          items: { $ref: "#/components/schemas/Reaction" }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/MessageAttachment" }
        mentions:
          type: array
          items: { $ref: "#/components/schemas/MentionedUser" }
        readByOther:
          type: ["boolean", "null"]
        poll:
          oneOf:
            - { $ref: "#/components/schemas/Poll" }
            - { type: "null" }
        createdAt: { type: string, format: date-time }
      required: [id, senderId, senderName, content, reactions, attachments, mentions, replyCount, createdAt]

    SendMessageBody:
      type: object
      properties:
        content: { type: string }
        replyToId:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        audioUrl:
          type: ["string", "null"]
        gifUrl:
          type: ["string", "null"]
      required: [content]

    Reaction:
      type: object
      properties:
        emoji: { type: string }
        count: { type: integer }
        reactedByMe: { type: boolean }
      required: [emoji, count, reactedByMe]

    ReactionBody:
      type: object
      properties:
        emoji: { type: string }
      required: [emoji]

    Room:
      type: object
      properties:
        tag: { type: string }
        memberCount: { type: integer }
        messageCount: { type: integer }
        followerCount: { type: integer }
        recentMessages: { type: integer }
        lastMessage:
          oneOf:
            - $ref: "#/components/schemas/Message"
            - type: "null"
        isFollowed: { type: boolean }
        isPrivate: { type: boolean }
        isMember: { type: boolean }
      required: [tag, memberCount, messageCount, followerCount, recentMessages, isFollowed, isPrivate, isMember]

    OverviewStats:
      type: object
      properties:
        userCount: { type: integer }
        hashtagCount: { type: integer }
        messageCount: { type: integer }
        roomCount: { type: integer }
      required: [userCount, hashtagCount, messageCount, roomCount]

    AdminUser:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        status: { type: string }
        featuredHashtag:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        role: { type: string }
        mvpPlan: { type: boolean }
        verified: { type: boolean }
        lastSeenAt: { type: string, format: date-time }
        bannedAt:
          type: ["string", "null"]
          format: date-time
        createdAt: { type: string, format: date-time }
      required: [id, username, displayName, status, role, mvpPlan, verified, lastSeenAt, createdAt]

    SetRoleBody:
      type: object
      properties:
        role: { type: string, enum: [user, moderator, admin] }
      required: [role]

    RedeemCodeBody:
      type: object
      properties:
        code: { type: string }
      required: [code]

    OkResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]

    SearchUserHit:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        avatarUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        verified: { type: boolean }
        mvpPlan: { type: boolean }
      required: [id, username, displayName, verified, mvpPlan]

    SearchHashtagHit:
      type: object
      properties:
        tag: { type: string }
        memberCount: { type: integer }
        messageCount: { type: integer }
        followerCount: { type: integer }
      required: [tag, memberCount, messageCount, followerCount]

    SearchRoomHit:
      type: object
      properties:
        tag: { type: string }
        memberCount: { type: integer }
        messageCount: { type: integer }
        followerCount: { type: integer }
        recentMessages: { type: integer }
        isPrivate: { type: boolean }
        isMember: { type: boolean }
      required: [tag, memberCount, messageCount, followerCount, recentMessages, isPrivate, isMember]

    SearchPostHit:
      type: object
      properties:
        id: { type: integer }
        author: { $ref: "#/components/schemas/PostAuthor" }
        content: { type: string }
        snippet: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, author, content, snippet, createdAt]

    SearchMessageHit:
      type: object
      properties:
        id: { type: integer }
        senderName: { type: string }
        senderUsername: { type: string }
        senderAvatarUrl:
          type: ["string", "null"]
        content: { type: string }
        snippet: { type: string }
        roomTag:
          type: ["string", "null"]
        conversationId:
          type: ["integer", "null"]
        href:
          type: ["string", "null"]
        createdAt: { type: string, format: date-time }
      required: [id, senderName, senderUsername, content, snippet, createdAt]

    SearchResults:
      type: object
      properties:
        q: { type: string }
        users:
          type: array
          items: { $ref: "#/components/schemas/SearchUserHit" }
        hashtags:
          type: array
          items: { $ref: "#/components/schemas/SearchHashtagHit" }
        rooms:
          type: array
          items: { $ref: "#/components/schemas/SearchRoomHit" }
        posts:
          type: array
          items: { $ref: "#/components/schemas/SearchPostHit" }
        messages:
          type: array
          items: { $ref: "#/components/schemas/SearchMessageHit" }
      required: [q, users, hashtags, rooms, posts, messages]

    BookmarkTarget:
