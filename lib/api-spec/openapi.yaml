      tags: [push]
      summary: Remove a browser Web Push subscription
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PushUnsubscribeBody" }
      responses:
        "204": { description: No content }

  /push/expo-subscribe:
    post:
      operationId: subscribeExpoPush
      tags: [push]
      summary: Register an Expo push token for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExpoPushSubscribeBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }

  /push/expo-unsubscribe:
    post:
      operationId: unsubscribeExpoPush
      tags: [push]
      summary: Remove an Expo push token registration
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExpoPushUnsubscribeBody" }
      responses:
        "204": { description: No content }

  /me/wallets/challenge:
    post:
      operationId: createWalletChallenge
      tags: [wallets]
      summary: Start the wallet linking flow by requesting a sign-in nonce
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WalletChallengeBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WalletChallengeResponse" }

  /me/wallets/verify:
    post:
      operationId: verifyWalletChallenge
      tags: [wallets]
      summary: Verify a signed wallet challenge and link the wallet
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WalletVerifyBody" }
      responses:
        "200":
          description: Wallet was already linked
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SolanaWallet" }
        "201":
          description: Wallet linked
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SolanaWallet" }

  /me/wallets:
    get:
      operationId: listMyWallets
      tags: [wallets]
      summary: List my linked Solana wallets
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WalletListResponse" }

  /me/wallets/{id}:
    delete:
      operationId: unlinkMyWallet
      tags: [wallets]
      summary: Unlink one of my Solana wallets
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No content }

  /me/wallets/{id}/primary:
    post:
      operationId: setPrimaryWallet
      tags: [wallets]
      summary: Mark one of my wallets as the primary one
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SolanaWallet" }

  /users/{id}/wallets:
    get:
      operationId: getUserWallets
      tags: [wallets]
      summary: Get the public wallet list for any user
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WalletListResponse" }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    User:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        pronouns:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        statusEmoji:
          type: ["string", "null"]
        statusText:
          type: ["string", "null"]
        status: { type: string }
        featuredHashtag:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        friendCode:
          type: ["string", "null"]
        role: { type: string }
        mvpPlan: { type: boolean }
        verified: { type: boolean }
        tier: { type: string, enum: [free, premium, pro] }
        billingPeriod:
          type: ["string", "null"]
          enum: [monthly, annual, null]
        animatedAvatarUrl:
          type: ["string", "null"]
        bannerGifUrl:
          type: ["string", "null"]
        premiumUntil:
          type: ["string", "null"]
          format: date-time
        lastSeenAt: { type: string, format: date-time }
        hidePresence: { type: boolean }
        hashtags:
          type: array
          items: { type: string }
        followedHashtags:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, username, displayName, status, role, mvpPlan, verified, tier, lastSeenAt, hidePresence, hashtags, followedHashtags, createdAt]

    UpdateUserBody:
      type: object
      properties:
        displayName: { type: string }
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        pronouns:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        statusEmoji:
          type: ["string", "null"]
        statusText:
          type: ["string", "null"]
        status: { type: string }
        featuredHashtag:
          type: ["string", "null"]
        animatedAvatarUrl:
          type: ["string", "null"]
        bannerGifUrl:
          type: ["string", "null"]
        hidePresence: { type: boolean }

    SetHashtagsBody:
      type: object
      properties:
        hashtags:
          type: array
          items: { type: string }
      required: [hashtags]

    Hashtag:
      type: object
      properties:
        tag: { type: string }
        memberCount: { type: integer }
        messageCount: { type: integer }
        followerCount: { type: integer }
      required: [tag, memberCount, messageCount, followerCount]

    TrendingHashtag:
      type: object
      properties:
        tag: { type: string }
        memberCount: { type: integer }
        messageCount: { type: integer }
        followerCount: { type: integer }
        recentMessages: { type: integer }
        score: { type: number }
      required: [tag, memberCount, messageCount, followerCount, recentMessages, score]

    HashtagDetail:
      type: object
      properties:
        tag: { type: string }
        memberCount: { type: integer }
        messageCount: { type: integer }
        followerCount: { type: integer }
        recentMessages: { type: integer }
        isFollowed: { type: boolean }
        isPrivate: { type: boolean }
        isMember: { type: boolean }
        ownerId:
          type: ["string", "null"]
        topMembers:
          type: array
          items: { $ref: "#/components/schemas/MatchUser" }
        relatedHashtags:
          type: array
          items: { type: string }
      required: [tag, memberCount, messageCount, followerCount, recentMessages, isFollowed, isPrivate, isMember, topMembers, relatedHashtags]

    MatchUser:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        status: { type: string }
        featuredHashtag:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        role: { type: string }
        mvpPlan: { type: boolean }
        verified: { type: boolean }
        tier: { type: string, enum: [free, premium, pro] }
        animatedAvatarUrl:
          type: ["string", "null"]
        bannerGifUrl:
          type: ["string", "null"]
        lastSeenAt: { type: string, format: date-time }
        presenceState:
          type: string
          enum: [online, away, offline]
          description: "Derived presence state — 'online' if active in the last 60s, 'away' within 10 min, otherwise 'offline'. Always 'offline' for users who hide their presence."
        currentRoomTag:
          type: ["string", "null"]
          description: "Hashtag of the room the user is currently active in, if any. Null when hidden or not in a room."
        hashtags:
          type: array
          items: { type: string }
        sharedHashtags:
          type: array
          items: { type: string }
        matchScore: { type: number }
        friendStatus:
          type: ["string", "null"]
          description: "One of: friends, request_sent, request_received, none"
        isFollowing: { type: boolean }
        followsMe: { type: boolean }
        isMuted: { type: boolean }
        isBlocked: { type: boolean }
      required: [id, username, displayName, status, role, mvpPlan, verified, lastSeenAt, hashtags, sharedHashtags, matchScore]

    FriendCodeResponse:
      type: object
      properties:
        friendCode:
          type: ["string", "null"]
      required: [friendCode]

    PublicProfile:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        animatedAvatarUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        bannerGifUrl:
          type: ["string", "null"]
        pronouns:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        statusEmoji:
          type: ["string", "null"]
        statusText:
          type: ["string", "null"]
        status: { type: string }
        featuredHashtag:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        role: { type: string }
        mvpPlan: { type: boolean }
        verified: { type: boolean }
        lastSeenAt: { type: string, format: date-time }
        presenceState:
          type: string
          enum: [online, away, offline]
          description: "Derived presence state — 'online' if active in the last 60s, 'away' within 10 min, otherwise 'offline'. Always 'offline' for users who hide their presence."
        currentRoomTag:
          type: ["string", "null"]
          description: "Hashtag of the room the user is currently active in, if any. Null when hidden or not in a room."
        createdAt: { type: string, format: date-time }
        hashtags:
          type: array
          items: { type: string }
        mutualHashtags:
          type: array
          items: { type: string }
        followerCount: { type: integer }
        followingCount: { type: integer }
        isFollowing: { type: boolean }
        followsMe: { type: boolean }
        isMuted: { type: boolean }
        isBlocked: { type: boolean }
        friendStatus:
          type: ["string", "null"]
      required:
        [id, username, displayName, status, role, mvpPlan, verified, lastSeenAt, createdAt,
         hashtags, mutualHashtags, followerCount, followingCount,
         isFollowing, followsMe, isMuted, isBlocked]

    MyRelationships:
      type: object
      properties:
        following:
          type: array
          items: { type: string }
        blocked:
          type: array
          items: { type: string }
        muted:
          type: array
          items: { type: string }
        mutedHashtags:
          type: array
          items: { type: string }
      required: [following, blocked, muted, mutedHashtags]

    BlocksAndMutesUser:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        avatarUrl:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        actedAt: { type: string, format: date-time }
      required: [id, username, displayName, actedAt]

    BlocksAndMutes:
      type: object
      properties:
        blocked:
          type: array
          items: { $ref: "#/components/schemas/BlocksAndMutesUser" }
        muted:
          type: array
          items: { $ref: "#/components/schemas/BlocksAndMutesUser" }
        mutedHashtags:
          type: array
          items:
            type: object
            properties:
              tag: { type: string }
              actedAt: { type: string, format: date-time }
            required: [tag, actedAt]
      required: [blocked, muted, mutedHashtags]

    FollowingFeedItem:
      type: object
      properties:
        kind: { type: string, enum: [post, room_join] }
