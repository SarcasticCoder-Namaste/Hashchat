openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: HashChat API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: users
  - name: hashtags
  - name: discovery
  - name: conversations
  - name: messages
  - name: rooms
  - name: friends
  - name: storage
  - name: photos
  - name: calls
  - name: posts
  - name: polls
  - name: gifs
  - name: notifications
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateUserBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }

  /me/hashtags:
    get:
      operationId: getMyHashtags
      tags: [users]
      summary: List my interest hashtags
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Hashtag" }
    put:
      operationId: setMyHashtags
      tags: [users]
      summary: Replace my interest hashtags
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetHashtagsBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Hashtag" }

  /me/followed-hashtags:
    get:
      operationId: getMyFollowedHashtags
      tags: [users]
      summary: List hashtags I follow
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Hashtag" }

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a public user profile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }

  /hashtags/trending:
    get:
      operationId: getTrendingHashtags
      tags: [hashtags]
      summary: Top trending hashtags by recent activity
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 12 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TrendingHashtag" }

  /hashtags/suggestions:
    get:
      operationId: getHashtagSuggestions
      tags: [hashtags]
      summary: Personalized hashtag suggestions for current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Hashtag" }

  /hashtags/search:
    get:
      operationId: searchHashtags
      tags: [hashtags]
      summary: Search hashtags by prefix
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Hashtag" }

  /hashtags/{tag}:
    get:
      operationId: getHashtag
      tags: [hashtags]
      summary: Get hashtag detail
      parameters:
        - name: tag
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HashtagDetail" }

  /hashtags/{tag}/follow:
    post:
      operationId: followHashtag
      tags: [hashtags]
      summary: Follow a hashtag
      parameters:
        - name: tag
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }
    delete:
      operationId: unfollowHashtag
      tags: [hashtags]
      summary: Unfollow a hashtag
      parameters:
        - name: tag
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }

  /discover/people:
    get:
      operationId: discoverPeople
      tags: [discovery]
      summary: Smart-matched people based on hashtag overlap
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 24 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MatchUser" }

  /conversations:
    get:
      operationId: getConversations
      tags: [conversations]
      summary: List my direct conversations
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Conversation" }
    post:
      operationId: openConversation
      tags: [conversations]
      summary: Open or create a direct conversation with another user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OpenConversationBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }

  /conversations/{id}/messages:
    get:
      operationId: getConversationMessages
      tags: [messages]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Message" }
    post:
      operationId: sendConversationMessage
      tags: [messages]
      summary: Send a message in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendMessageBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }

  /messages/{id}/reactions:
    post:
      operationId: addMessageReaction
      tags: [messages]
      summary: Add a reaction to a message
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReactionBody" }
      responses:
        "204": { description: No content }
    delete:
      operationId: removeMessageReaction
      tags: [messages]
      summary: Remove my reaction from a message
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: emoji
          in: query
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }

  /rooms:
    get:
      operationId: getRooms
      tags: [rooms]
      summary: List hashtag rooms I follow (with unread/last message)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Room" }

  /rooms/trending:
    get:
      operationId: getTrendingRooms
      tags: [rooms]
      summary: Trending hashtag rooms
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 12 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Room" }

  /rooms/{tag}/messages:
    get:
      operationId: getRoomMessages
      tags: [rooms]
      summary: List recent messages in a hashtag room
      parameters:
        - name: tag
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Message" }
    post:
      operationId: sendRoomMessage
      tags: [rooms]
      summary: Post a message into a hashtag room
      parameters:
        - name: tag
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendMessageBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }

  /conversations/{id}/background:
    patch:
      operationId: setConversationBackground
      tags: [conversations]
      summary: Set chat background image for this conversation (per-user override)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetBackgroundBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
    delete:
      operationId: clearConversationBackground
      tags: [conversations]
      summary: Clear chat background for this conversation
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No content }

  /me/photos:
    get:
      operationId: getMyPhotos
      tags: [photos]
      summary: List my photo gallery
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UserPhoto" }
    post:
      operationId: addMyPhoto
      tags: [photos]
      summary: Add a photo to my gallery
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddPhotoBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserPhoto" }

  /me/photos/{id}:
    delete:
      operationId: deleteMyPhoto
      tags: [photos]
      summary: Delete one of my photos
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No content }

  /users/{username}/photos:
    get:
      operationId: getUserPhotos
      tags: [photos]
      summary: List a user's photo gallery
      parameters:
        - { name: username, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UserPhoto" }

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned URL for upload
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UploadUrlRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadUrlResponse" }

  /calls:
    post:
      operationId: initiateCall
      tags: [calls]
      summary: Initiate a voice/video call
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InitiateCallBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Call" }

  /calls/incoming:
    get:
      operationId: getIncomingCalls
      tags: [calls]
      summary: List active calls I am invited to
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Call" }

  /calls/{id}:
    get:
      operationId: getCall
      tags: [calls]
      summary: Get call details
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Call" }

  /calls/{id}/join:
    post:
      operationId: joinCall
      tags: [calls]
      summary: Mark myself as joined to this call
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Call" }

  /calls/{id}/leave:
    post:
      operationId: leaveCall
      tags: [calls]
      summary: Leave the call (or end if last participant)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }

  /calls/{id}/signals:
    post:
      operationId: sendCallSignal
      tags: [calls]
      summary: Send a WebRTC signaling message
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CallSignalBody" }
      responses:
        "204": { description: No content }
    get:
      operationId: getCallSignals
      tags: [calls]
      summary: Poll signaling messages addressed to me
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: since, in: query, required: false, schema: { type: integer, default: 0 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CallSignalList" }

  /me/friend-code:
    get:
      operationId: getMyFriendCode
      tags: [friends]
      summary: Get my friend code
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FriendCodeResponse" }

  /me/friend-code/regenerate:
    post:
      operationId: regenerateMyFriendCode
      tags: [friends]
      summary: Regenerate my friend code
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FriendCodeResponse" }

  /users/by-code/{code}:
    get:
      operationId: lookupUserByFriendCode
      tags: [friends]
      summary: Look up a user by their friend code
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MatchUser" }
        "404": { description: No user found for that code }

  /me/friends:
    get:
      operationId: getMyFriends
      tags: [friends]
      summary: List my accepted friends
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MatchUser" }

  /me/friends/requests:
    get:
      operationId: getFriendRequests
      tags: [friends]
      summary: List incoming and outgoing friend requests
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FriendRequestList" }

  /users/lookup:
    get:
      operationId: lookupUserByCode
      tags: [friends]
      summary: Look up a user by their friend code (username#discriminator)
      parameters:
        - name: code
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Match
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MatchUser" }
        "400":
          description: Bad request
        "404":
          description: Not found

  /users/{id}/friend-request:
    post:
      operationId: sendFriendRequest
      tags: [friends]
      summary: Send a friend request to a user
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }
    delete:
      operationId: cancelFriendRequest
      tags: [friends]
      summary: Cancel a pending outgoing friend request
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }

  /me/friends/{id}/accept:
    post:
      operationId: acceptFriendRequest
      tags: [friends]
      summary: Accept an incoming friend request
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }

  /me/friends/{id}/decline:
    post:
      operationId: declineFriendRequest
      tags: [friends]
      summary: Decline an incoming friend request
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }

  /me/friends/{id}:
    delete:
      operationId: unfriend
      tags: [friends]
      summary: Remove an existing friendship
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }

  /stats/overview:
    get:
      operationId: getOverviewStats
      tags: [hashtags]
      summary: App-wide overview stats for the dashboard
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OverviewStats" }

  /users/by-username/{username}:
    get:
      operationId: getUserByUsername
      tags: [users]
      summary: Get a public user profile by username
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicProfile" }
        "404": { description: Not found }

  /users/{id}/follow:
    post:
      operationId: followUser
      tags: [users]
      summary: Follow a user
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: No content }
    delete:
      operationId: unfollowUser
      tags: [users]
      summary: Unfollow a user
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: No content }

  /users/{id}/block:
    post:
      operationId: blockUser
      tags: [users]
      summary: Block a user
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: No content }
    delete:
      operationId: unblockUser
      tags: [users]
      summary: Unblock a user
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: No content }

  /users/{id}/mute:
    post:
      operationId: muteUser
      tags: [users]
      summary: Mute a user (hide from feeds)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: No content }
    delete:
      operationId: unmuteUser
      tags: [users]
      summary: Unmute a user
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: No content }

  /hashtags/{tag}/mute:
    post:
      operationId: muteHashtag
      tags: [hashtags]
      summary: Mute a hashtag (hide from feeds & trending)
      parameters:
        - { name: tag, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: No content }
    delete:
      operationId: unmuteHashtag
      tags: [hashtags]
      summary: Unmute a hashtag
      parameters:
        - { name: tag, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: No content }

  /me/relationships:
    get:
      operationId: getMyRelationships
      tags: [users]
      summary: My follows / blocks / mutes / muted hashtags (ids)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MyRelationships" }

  /me/blocks-mutes:
    get:
      operationId: getMyBlocksAndMutes
      tags: [users]
      summary: Detailed list of blocked users, muted users and muted hashtags
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BlocksAndMutes" }

  /discover/following:
    get:
      operationId: getFollowingFeed
      tags: [discovery]
      summary: Recent activity (posts and joined rooms) from people I follow
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 30 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FollowingFeedItem" }

  /discover/suggestions:
    get:
      operationId: getFollowSuggestions
      tags: [discovery]
      summary: Suggested users to follow based on shared hashtags
      description: >-
        When `username` is omitted, returns users who share hashtags with the
        current user (used to bootstrap the Following tab). When `username` is
        provided, returns users similar to that profile (Similar people on a
        public profile). Already-followed, blocked and muted users are excluded.
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 8 }
        - name: username
          in: query
          required: false
          description: If provided, suggest people similar to this user.
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MatchUser" }

  /me/notifications:
    get:
      operationId: getMyNotifications
      tags: [notifications]
      summary: List my recent notifications
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 30 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Notification" }

  /me/notifications/unread-count:
    get:
      operationId: getMyUnreadNotificationCount
      tags: [notifications]
      summary: Count my unread notifications
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnreadCount" }

  /me/notifications/read:
    post:
      operationId: markMyNotificationsRead
      tags: [notifications]
      summary: Mark all of my unread notifications as read
      responses:
        "204": { description: No content }

  /me/redeem-mvp-code:
    post:
      operationId: redeemMvpCode
      tags: [users]
      summary: Redeem an MVP plan code
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RedeemCodeBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
        "404": { description: Invalid code }
        "409": { description: Already redeemed }

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (moderator+)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminUser" }

  /admin/users/{id}/ban:
    post:
      operationId: adminBanUser
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }
    delete:
      operationId: adminUnbanUser
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }

  /admin/users/{id}/role:
    post:
      operationId: adminSetUserRole
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetRoleBody" }
      responses:
        "204": { description: No content }

  /admin/messages/{id}:
    delete:
      operationId: adminDeleteMessage
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204": { description: No content }

  /admin/mvp-codes:
    get:
      operationId: adminListMvpCodes
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MvpCode" }
    post:
      operationId: adminCreateMvpCode
      tags: [admin]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMvpCodeBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreatedCode" }

  /admin/stats:
    get:
      operationId: adminStats
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminStats" }

  /posts:
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a new post
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePostBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }

  /posts/{id}:
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete one of my posts
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No content }

  /me/feed/posts:
    get:
      operationId: getMyFeedPosts
      tags: [posts]
      summary: List recent posts from hashtags I follow (most recent first)
      parameters:
        - { name: before, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 30 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Post" }

  /hashtags/{tag}/posts:
    get:
      operationId: getHashtagPosts
      tags: [posts]
      summary: List posts tagged with this hashtag (most recent first)
      parameters:
        - { name: tag, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Post" }

  /users/{id}/posts:
    get:
      operationId: getUserPosts
      tags: [posts]
      summary: List posts by a user
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Post" }

  /rooms/{tag}/polls:
    get:
      operationId: getRoomPolls
      tags: [polls]
      summary: List active polls in a hashtag room (recent first)
      parameters:
        - { name: tag, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Poll" }
    post:
      operationId: createRoomPoll
      tags: [polls]
      summary: Create a new poll inside a hashtag room
      parameters:
        - { name: tag, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePollBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Poll" }

  /polls/{id}/vote:
    post:
      operationId: votePoll
      tags: [polls]
      summary: Cast a vote in a poll (one per user)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VotePollBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Poll" }

  /link-preview:
    get:
      operationId: getLinkPreview
      tags: [posts]
      summary: Fetch Open Graph metadata for a URL
      parameters:
        - { name: url, in: query, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LinkPreview" }

  /gifs/search:
    get:
      operationId: searchGifs
      tags: [gifs]
      summary: Search GIFs via the configured GIF provider
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 24 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GifSearchResult" }
        "503":
          description: GIF provider not configured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GifConfigError" }

  /reels/youtube:
    get:
      operationId: getYoutubeReels
      tags: [reels]
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string }
        - name: max
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReelsList" }
        "503":
          description: YouTube API key not configured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReelsConfigError" }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    User:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        pronouns:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        statusEmoji:
          type: ["string", "null"]
        statusText:
          type: ["string", "null"]
        status: { type: string }
        featuredHashtag:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        friendCode:
          type: ["string", "null"]
        role: { type: string }
        mvpPlan: { type: boolean }
        lastSeenAt: { type: string, format: date-time }
        hashtags:
          type: array
          items: { type: string }
        followedHashtags:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, username, displayName, status, role, mvpPlan, lastSeenAt, hashtags, followedHashtags, createdAt]

    UpdateUserBody:
      type: object
      properties:
        displayName: { type: string }
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        pronouns:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        statusEmoji:
          type: ["string", "null"]
        statusText:
          type: ["string", "null"]
        status: { type: string }
        featuredHashtag:
          type: ["string", "null"]

    SetHashtagsBody:
      type: object
      properties:
        hashtags:
          type: array
          items: { type: string }
      required: [hashtags]

    Hashtag:
      type: object
      properties:
        tag: { type: string }
        memberCount: { type: integer }
        messageCount: { type: integer }
        followerCount: { type: integer }
      required: [tag, memberCount, messageCount, followerCount]

    TrendingHashtag:
      type: object
      properties:
        tag: { type: string }
        memberCount: { type: integer }
        messageCount: { type: integer }
        followerCount: { type: integer }
        recentMessages: { type: integer }
        score: { type: number }
      required: [tag, memberCount, messageCount, followerCount, recentMessages, score]

    HashtagDetail:
      type: object
      properties:
        tag: { type: string }
        memberCount: { type: integer }
        messageCount: { type: integer }
        followerCount: { type: integer }
        recentMessages: { type: integer }
        isFollowed: { type: boolean }
        topMembers:
          type: array
          items: { $ref: "#/components/schemas/MatchUser" }
        relatedHashtags:
          type: array
          items: { type: string }
      required: [tag, memberCount, messageCount, followerCount, recentMessages, isFollowed, topMembers, relatedHashtags]

    MatchUser:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        status: { type: string }
        featuredHashtag:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        role: { type: string }
        mvpPlan: { type: boolean }
        lastSeenAt: { type: string, format: date-time }
        hashtags:
          type: array
          items: { type: string }
        sharedHashtags:
          type: array
          items: { type: string }
        matchScore: { type: number }
        friendStatus:
          type: ["string", "null"]
          description: "One of: friends, request_sent, request_received, none"
        isFollowing: { type: boolean }
        followsMe: { type: boolean }
        isMuted: { type: boolean }
        isBlocked: { type: boolean }
      required: [id, username, displayName, status, role, mvpPlan, lastSeenAt, hashtags, sharedHashtags, matchScore]

    FriendCodeResponse:
      type: object
      properties:
        friendCode:
          type: ["string", "null"]
      required: [friendCode]

    PublicProfile:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        pronouns:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        statusEmoji:
          type: ["string", "null"]
        statusText:
          type: ["string", "null"]
        status: { type: string }
        featuredHashtag:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        role: { type: string }
        mvpPlan: { type: boolean }
        lastSeenAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        hashtags:
          type: array
          items: { type: string }
        mutualHashtags:
          type: array
          items: { type: string }
        followerCount: { type: integer }
        followingCount: { type: integer }
        isFollowing: { type: boolean }
        followsMe: { type: boolean }
        isMuted: { type: boolean }
        isBlocked: { type: boolean }
        friendStatus:
          type: ["string", "null"]
      required:
        [id, username, displayName, status, role, mvpPlan, lastSeenAt, createdAt,
         hashtags, mutualHashtags, followerCount, followingCount,
         isFollowing, followsMe, isMuted, isBlocked]

    MyRelationships:
      type: object
      properties:
        following:
          type: array
          items: { type: string }
        blocked:
          type: array
          items: { type: string }
        muted:
          type: array
          items: { type: string }
        mutedHashtags:
          type: array
          items: { type: string }
      required: [following, blocked, muted, mutedHashtags]

    BlocksAndMutesUser:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        avatarUrl:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        actedAt: { type: string, format: date-time }
      required: [id, username, displayName, actedAt]

    BlocksAndMutes:
      type: object
      properties:
        blocked:
          type: array
          items: { $ref: "#/components/schemas/BlocksAndMutesUser" }
        muted:
          type: array
          items: { $ref: "#/components/schemas/BlocksAndMutesUser" }
        mutedHashtags:
          type: array
          items:
            type: object
            properties:
              tag: { type: string }
              actedAt: { type: string, format: date-time }
            required: [tag, actedAt]
      required: [blocked, muted, mutedHashtags]

    FollowingFeedItem:
      type: object
      properties:
        kind: { type: string, enum: [post, room_join] }
        id: { type: string }
        user: { $ref: "#/components/schemas/MatchUser" }
        roomTag:
          type: ["string", "null"]
        content:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        createdAt: { type: string, format: date-time }
      required: [kind, id, user, createdAt]

    Notification:
      type: object
      properties:
        id: { type: integer }
        kind: { type: string, description: "e.g. follow" }
        actor: { $ref: "#/components/schemas/MatchUser" }
        createdAt: { type: string, format: date-time }
        readAt:
          type: ["string", "null"]
          format: date-time
      required: [id, kind, actor, createdAt]

    UnreadCount:
      type: object
      properties:
        count: { type: integer }
      required: [count]

    FriendRequestList:
      type: object
      properties:
        incoming:
          type: array
          items: { $ref: "#/components/schemas/MatchUser" }
        outgoing:
          type: array
          items: { $ref: "#/components/schemas/MatchUser" }
      required: [incoming, outgoing]

    Conversation:
      type: object
      properties:
        id: { type: integer }
        otherUser: { $ref: "#/components/schemas/MatchUser" }
        lastMessage:
          oneOf:
            - $ref: "#/components/schemas/Message"
            - type: "null"
        unreadCount: { type: integer }
        backgroundUrl:
          type: ["string", "null"]
        updatedAt: { type: string, format: date-time }
      required: [id, otherUser, unreadCount, updatedAt]

    SetBackgroundBody:
      type: object
      properties:
        backgroundUrl: { type: string }
      required: [backgroundUrl]

    UserPhoto:
      type: object
      properties:
        id: { type: integer }
        userId: { type: string }
        imageUrl: { type: string }
        caption:
          type: ["string", "null"]
        createdAt: { type: string, format: date-time }
      required: [id, userId, imageUrl, createdAt]

    AddPhotoBody:
      type: object
      properties:
        imageUrl: { type: string }
        caption:
          type: ["string", "null"]
      required: [imageUrl]

    UploadUrlRequest:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        size: { type: integer, minimum: 1 }
        contentType: { type: string, minLength: 1 }
      required: [name, size, contentType]

    UploadUrlResponse:
      type: object
      properties:
        uploadURL: { type: string, format: uri }
        objectPath: { type: string }
        metadata: { $ref: "#/components/schemas/UploadUrlRequest" }
      required: [uploadURL, objectPath]

    InitiateCallBody:
      type: object
      properties:
        kind: { type: string, enum: [voice, video] }
        conversationId:
          type: ["integer", "null"]
        roomTag:
          type: ["string", "null"]
      required: [kind]

    Call:
      type: object
      properties:
        id: { type: integer }
        initiatorId: { type: string }
        kind: { type: string }
        status: { type: string }
        conversationId:
          type: ["integer", "null"]
        roomTag:
          type: ["string", "null"]
        startedAt: { type: string, format: date-time }
        endedAt:
          type: ["string", "null"]
          format: date-time
        participants:
          type: array
          items: { $ref: "#/components/schemas/CallParticipant" }
      required: [id, initiatorId, kind, status, startedAt, participants]

    CallParticipant:
      type: object
      properties:
        userId: { type: string }
        username: { type: string }
        displayName: { type: string }
        avatarUrl:
          type: ["string", "null"]
        state: { type: string }
        joinedAt:
          type: ["string", "null"]
          format: date-time
      required: [userId, username, displayName, state]

    CallSignalBody:
      type: object
      properties:
        toUserId: { type: string }
        kind: { type: string, enum: [offer, answer, ice] }
        payload: { type: string }
      required: [toUserId, kind, payload]

    CallSignal:
      type: object
      properties:
        id: { type: integer }
        callId: { type: integer }
        fromUserId: { type: string }
        toUserId: { type: string }
        kind: { type: string }
        payload: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, callId, fromUserId, toUserId, kind, payload, createdAt]

    CallSignalList:
      type: object
      properties:
        signals:
          type: array
          items: { $ref: "#/components/schemas/CallSignal" }
        cursor: { type: integer }
      required: [signals, cursor]

    OpenConversationBody:
      type: object
      properties:
        userId: { type: string }
      required: [userId]

    Message:
      type: object
      properties:
        id: { type: integer }
        conversationId:
          type: ["integer", "null"]
        roomTag:
          type: ["string", "null"]
        senderId: { type: string }
        senderName: { type: string }
        senderAvatarUrl:
          type: ["string", "null"]
        content: { type: string }
        replyToId:
          type: ["integer", "null"]
        replyToContent:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        audioUrl:
          type: ["string", "null"]
        reactions:
          type: array
          items: { $ref: "#/components/schemas/Reaction" }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/MessageAttachment" }
        poll:
          oneOf:
            - { $ref: "#/components/schemas/Poll" }
            - { type: "null" }
        createdAt: { type: string, format: date-time }
      required: [id, senderId, senderName, content, reactions, attachments, createdAt]

    SendMessageBody:
      type: object
      properties:
        content: { type: string }
        replyToId:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        audioUrl:
          type: ["string", "null"]
        gifUrl:
          type: ["string", "null"]
      required: [content]

    Reaction:
      type: object
      properties:
        emoji: { type: string }
        count: { type: integer }
        reactedByMe: { type: boolean }
      required: [emoji, count, reactedByMe]

    ReactionBody:
      type: object
      properties:
        emoji: { type: string }
      required: [emoji]

    Room:
      type: object
      properties:
        tag: { type: string }
        memberCount: { type: integer }
        messageCount: { type: integer }
        followerCount: { type: integer }
        recentMessages: { type: integer }
        lastMessage:
          oneOf:
            - $ref: "#/components/schemas/Message"
            - type: "null"
        isFollowed: { type: boolean }
      required: [tag, memberCount, messageCount, followerCount, recentMessages, isFollowed]

    OverviewStats:
      type: object
      properties:
        userCount: { type: integer }
        hashtagCount: { type: integer }
        messageCount: { type: integer }
        roomCount: { type: integer }
      required: [userCount, hashtagCount, messageCount, roomCount]

    AdminUser:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        status: { type: string }
        featuredHashtag:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        role: { type: string }
        mvpPlan: { type: boolean }
        lastSeenAt: { type: string, format: date-time }
        bannedAt:
          type: ["string", "null"]
          format: date-time
        createdAt: { type: string, format: date-time }
      required: [id, username, displayName, status, role, mvpPlan, lastSeenAt, createdAt]

    SetRoleBody:
      type: object
      properties:
        role: { type: string, enum: [user, moderator, admin] }
      required: [role]

    RedeemCodeBody:
      type: object
      properties:
        code: { type: string }
      required: [code]

    OkResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]

    MvpCode:
      type: object
      properties:
        code: { type: string }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        redeemedBy:
          type: ["string", "null"]
        redeemedAt:
          type: ["string", "null"]
          format: date-time
        note:
          type: ["string", "null"]
      required: [code, createdBy, createdAt]

    CreateMvpCodeBody:
      type: object
      properties:
        note:
          type: ["string", "null"]

    CreatedCode:
      type: object
      properties:
        code: { type: string }
      required: [code]

    AdminStats:
      type: object
      properties:
        users: { type: integer }
        messages: { type: integer }
        mvp: { type: integer }
        banned: { type: integer }
      required: [users, messages, mvp, banned]

    ReelItem:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        channel: { type: string }
        thumbnail: { type: string }
        publishedAt: { type: string, format: date-time }
      required: [id, title, channel, thumbnail, publishedAt]

    ReelsList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ReelItem" }
      required: [items]

    ReelsConfigError:
      type: object
      properties:
        error: { type: string }
        message: { type: string }
      required: [error, message]

    Gif:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        url: { type: string }
        previewUrl: { type: string }
        width: { type: integer }
        height: { type: integer }
      required: [id, title, url, previewUrl, width, height]

    GifSearchResult:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Gif" }
        nextOffset:
          type: ["integer", "null"]
        provider: { type: string }
      required: [items, provider]

    GifConfigError:
      type: object
      properties:
        error: { type: string }
        message: { type: string }
      required: [error, message]

    PostAuthor:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        avatarUrl:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        role: { type: string }
        mvpPlan: { type: boolean }
      required: [id, username, displayName, role, mvpPlan]

    Post:
      type: object
      properties:
        id: { type: integer }
        author: { $ref: "#/components/schemas/PostAuthor" }
        content: { type: string }
        hashtags:
          type: array
          items: { type: string }
        imageUrls:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, author, content, hashtags, imageUrls, createdAt]

    CreatePostBody:
      type: object
      properties:
        content: { type: string, maxLength: 500 }
        hashtags:
          type: array
          items: { type: string }
        imageUrls:
          type: array
          items: { type: string }
      required: [content]

    PollOption:
      type: object
      properties:
        id: { type: integer }
        text: { type: string }
        votes: { type: integer }
        votedByMe: { type: boolean }
      required: [id, text, votes, votedByMe]

    Poll:
      type: object
      properties:
        id: { type: integer }
        roomTag: { type: string }
        creatorId: { type: string }
        creatorName: { type: string }
        question: { type: string }
        options:
          type: array
          items: { $ref: "#/components/schemas/PollOption" }
        totalVotes: { type: integer }
        myVoteOptionId:
          type: ["integer", "null"]
        expiresAt:
          type: ["string", "null"]
          format: date-time
        isExpired: { type: boolean }
        createdAt: { type: string, format: date-time }
      required: [id, roomTag, creatorId, creatorName, question, options, totalVotes, isExpired, createdAt]

    CreatePollBody:
      type: object
      properties:
        question: { type: string, minLength: 1, maxLength: 200 }
        options:
          type: array
          minItems: 2
          maxItems: 6
          items: { type: string, minLength: 1, maxLength: 80 }
        expiresAt:
          type: ["string", "null"]
          format: date-time
      required: [question, options]

    VotePollBody:
      type: object
      properties:
        optionId: { type: integer }
      required: [optionId]

    LinkPreview:
      type: object
      properties:
        url: { type: string }
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
      required: [url]

    MessageAttachment:
      type: object
      properties:
        id: { type: integer }
        kind: { type: string, enum: [image, gif, link_preview, poll] }
        url: { type: string }
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
      required: [id, kind, url]
