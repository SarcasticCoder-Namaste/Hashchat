openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: HashChat API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: users
  - name: hashtags
  - name: discovery
  - name: conversations
  - name: messages
  - name: rooms
  - name: friends
  - name: storage
  - name: photos
  - name: calls
  - name: posts
  - name: polls
  - name: gifs
  - name: notifications
  - name: events
  - name: communities
  - name: premium
  - name: search
  - name: bookmarks
  - name: preferences
  - name: push
  - name: wallets
  - name: presence
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateUserBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }

  /me/hashtags:
    get:
      operationId: getMyHashtags
      tags: [users]
      summary: List my interest hashtags
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Hashtag" }
    put:
      operationId: setMyHashtags
      tags: [users]
      summary: Replace my interest hashtags
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetHashtagsBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Hashtag" }

  /me/followed-hashtags:
    get:
      operationId: getMyFollowedHashtags
      tags: [users]
      summary: List hashtags I follow
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Hashtag" }

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a public user profile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }

  /hashtags/trending:
    get:
      operationId: getTrendingHashtags
      tags: [hashtags]
      summary: Top trending hashtags by recent activity
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 12 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TrendingHashtag" }

  /hashtags/suggestions:
    get:
      operationId: getHashtagSuggestions
      tags: [hashtags]
      summary: Personalized hashtag suggestions for current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Hashtag" }

  /hashtags/search:
    get:
      operationId: searchHashtags
      tags: [hashtags]
      summary: Search hashtags by prefix
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Hashtag" }

  /hashtags/{tag}:
    get:
      operationId: getHashtag
      tags: [hashtags]
      summary: Get hashtag detail
      parameters:
        - name: tag
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HashtagDetail" }

  /hashtags/{tag}/follow:
    post:
      operationId: followHashtag
      tags: [hashtags]
      summary: Follow a hashtag
      parameters:
        - name: tag
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }
    delete:
      operationId: unfollowHashtag
      tags: [hashtags]
      summary: Unfollow a hashtag
      parameters:
        - name: tag
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }

  /discover/people:
    get:
      operationId: discoverPeople
      tags: [discovery]
      summary: Smart-matched people based on hashtag overlap
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 24 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MatchUser" }

  /discover/foryou:
    get:
      operationId: getForYouFeed
      tags: [discovery]
      summary: Personalized "For You" mixed feed of posts, rooms and people
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 30 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForYouFeed" }

  /discovery/explore:
    get:
      operationId: getExplore
      tags: [discovery]
      summary: Aggregated Explore page payload (trending, suggestions, hot posts, for-you preview)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExploreResponse" }

  /discovery/hot-in-your-hashtags:
    get:
      operationId: getHotInYourHashtags
      tags: [discovery]
      summary: Top engaging posts of the last 24h within hashtags the user follows
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/HotPost" }

  /discovery/trending-events:
    get:
      operationId: getTrendingEvents
      tags: [discovery]
      summary: Top upcoming events across rooms relevant to the user
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 12 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Event" }

  /hashtags/{tag}/analytics:
    get:
      operationId: getHashtagAnalytics
      tags: [hashtags]
      summary: Analytics for a hashtag (followers, contributors, related, volume)
      parameters:
        - { name: tag, in: path, required: true, schema: { type: string } }
        - { name: days, in: query, required: false, schema: { type: integer, default: 14 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HashtagAnalytics" }

  /rooms/{tag}/events:
    get:
      operationId: getRoomEvents
      tags: [events]
      summary: List events scheduled inside a hashtag room
      parameters:
        - { name: tag, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Event" }
    post:
      operationId: createRoomEvent
      tags: [events]
      summary: Schedule a new event in a hashtag room (moderators only)
      parameters:
        - { name: tag, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateEventBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Event" }
        "403": { description: Not allowed to schedule in this room }

  /events/upcoming:
    get:
      operationId: getUpcomingEvents
      tags: [events]
      summary: Globally upcoming and live events (most recent first)
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, default: 10 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Event" }

  /events/{id}/rsvp:
    post:
      operationId: rsvpEvent
      tags: [events]
      summary: RSVP "going" to an event
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Event" }
    delete:
      operationId: cancelRsvpEvent
      tags: [events]
      summary: Cancel my RSVP for an event
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Event" }

  /events/{id}:
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an event's title, description, or schedule (creator or room moderator)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateRoomEventBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Event" }
        "403": { description: Not allowed }
        "404": { description: Not found }
    delete:
      operationId: cancelEvent
      tags: [events]
      summary: Cancel an event (creator or room moderator)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No content }
        "403": { description: Not allowed }

  /conversations:
    get:
      operationId: getConversations
      tags: [conversations]
      summary: List my direct conversations
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Conversation" }
    post:
      operationId: openConversation
      tags: [conversations]
      summary: Open or create a direct conversation with another user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OpenConversationBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }

  /conversations/group:
    post:
      operationId: createGroupConversation
      tags: [conversations]
      summary: Create a new group conversation (3-10 members including me)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateGroupConversationBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }

  /conversations/{id}:
    patch:
      operationId: renameConversation
      tags: [conversations]
      summary: Rename a group conversation (creator only)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RenameConversationBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }

  /conversations/{id}/members:
    post:
      operationId: addConversationMembers
      tags: [conversations]
      summary: Add members to a group conversation (any member)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddConversationMembersBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }

  /conversations/{id}/members/{userId}:
    delete:
      operationId: removeConversationMember
      tags: [conversations]
      summary: Remove a member from a group conversation (creator only)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: No content }

  /conversations/{id}/leave:
    post:
      operationId: leaveConversation
      tags: [conversations]
      summary: Leave a group conversation
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No content }

  /conversations/{id}/messages:
    get:
      operationId: getConversationMessages
      tags: [messages]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Message" }
    post:
      operationId: sendConversationMessage
      tags: [messages]
      summary: Send a message in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendMessageBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }

  /messages/{id}/reactions:
    post:
      operationId: addMessageReaction
      tags: [messages]
      summary: Add a reaction to a message
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReactionBody" }
      responses:
        "204": { description: No content }
    delete:
      operationId: removeMessageReaction
      tags: [messages]
      summary: Remove my reaction from a message
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: emoji
          in: query
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }

  /messages/{id}/replies:
    get:
      operationId: getMessageReplies
      tags: [messages]
      summary: Get the parent message and all its replies as a thread
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageThread" }

  /posts/{id}/reactions:
    post:
      operationId: addPostReaction
      tags: [posts]
      summary: Add a reaction to a post
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReactionBody" }
      responses:
        "204": { description: No content }
    delete:
      operationId: removePostReaction
      tags: [posts]
      summary: Remove my reaction from a post
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: emoji, in: query, required: true, schema: { type: string } }
      responses:
        "204": { description: No content }

  /users/mention-suggestions:
    get:
      operationId: getMentionSuggestions
      tags: [users]
      summary: Autocomplete suggestions for @mentions
      parameters:
        - { name: q, in: query, required: false, schema: { type: string } }
        - { name: scopeType, in: query, required: false, schema: { type: string } }
        - { name: scopeId, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MentionSuggestion" }

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: List my notifications (newest first)
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationsResponse" }

  /notifications/unread-count:
    get:
      operationId: getUnreadNotificationCount
      tags: [notifications]
      summary: Total unread notifications + DMs badge counts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnreadCountResponse" }

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all my notifications read
      responses:
        "204": { description: No content }

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No content }

  /notifications/mutes:
    get:
      operationId: getNotificationMutes
      tags: [notifications]
      summary: List my muted notification sources (users and hashtags)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationMutes" }

  /notifications/mutes/users/{id}:
    post:
      operationId: muteNotificationsFromUser
      tags: [notifications]
      summary: Stop receiving notifications triggered by a user
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: No content }
    delete:
      operationId: unmuteNotificationsFromUser
      tags: [notifications]
      summary: Resume receiving notifications triggered by a user
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: No content }

  /notifications/mutes/hashtags/{tag}:
    post:
      operationId: muteNotificationsFromHashtag
      tags: [notifications]
      summary: Stop receiving notifications originating in a hashtag room
      parameters:
        - { name: tag, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: No content }
    delete:
      operationId: unmuteNotificationsFromHashtag
      tags: [notifications]
      summary: Resume receiving notifications originating in a hashtag room
      parameters:
        - { name: tag, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: No content }

  /conversations/{id}/typing:
    post:
      operationId: pingConversationTyping
      tags: [conversations]
      summary: Heartbeat that current user is typing in this conversation
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No content }
    get:
      operationId: getConversationTyping
      tags: [conversations]
      summary: Who is typing in this conversation right now (excluding me)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TypingResponse" }

  /conversations/{id}/read:
    post:
      operationId: markConversationRead
      tags: [conversations]
      summary: Record per-message read receipt up to a given message id
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MarkConversationReadBody" }
      responses:
        "204": { description: No content }

  /rooms:
    get:
      operationId: getRooms
      tags: [rooms]
      summary: List hashtag rooms I follow (with unread/last message)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Room" }

  /rooms/trending:
    get:
      operationId: getTrendingRooms
      tags: [rooms]
      summary: Trending hashtag rooms
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 12 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Room" }

  /rooms/{tag}/messages:
    get:
      operationId: getRoomMessages
      tags: [rooms]
      summary: List recent messages in a hashtag room
      parameters:
        - name: tag
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Message" }
    post:
      operationId: sendRoomMessage
      tags: [rooms]
      summary: Post a message into a hashtag room
      parameters:
        - name: tag
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendMessageBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }

  /rooms/{tag}/typing:
    post:
      operationId: pingRoomTyping
      tags: [rooms]
      summary: Heartbeat that current user is typing in this room
      parameters:
        - name: tag
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }
    get:
      operationId: getRoomTyping
      tags: [rooms]
      summary: Who is typing in this room right now (excluding me)
      parameters:
        - name: tag
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TypingResponse" }

  /conversations/{id}/background:
    patch:
      operationId: setConversationBackground
      tags: [conversations]
      summary: Set chat background image for this conversation (per-user override)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetBackgroundBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
    delete:
      operationId: clearConversationBackground
      tags: [conversations]
      summary: Clear chat background for this conversation
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No content }

  /me/photos:
    get:
      operationId: getMyPhotos
      tags: [photos]
      summary: List my photo gallery
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UserPhoto" }
    post:
      operationId: addMyPhoto
      tags: [photos]
      summary: Add a photo to my gallery
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddPhotoBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
