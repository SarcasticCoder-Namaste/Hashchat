        roomTag:
          type: ["string", "null"]
        content:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        createdAt: { type: string, format: date-time }
      required: [kind, id, user, createdAt]

    FriendRequestList:
      type: object
      properties:
        incoming:
          type: array
          items: { $ref: "#/components/schemas/MatchUser" }
        outgoing:
          type: array
          items: { $ref: "#/components/schemas/MatchUser" }
      required: [incoming, outgoing]

    Conversation:
      type: object
      properties:
        id: { type: integer }
        kind: { type: string, enum: [direct, group] }
        title:
          type: ["string", "null"]
        creatorId:
          type: ["string", "null"]
        otherUser:
          oneOf:
            - $ref: "#/components/schemas/MatchUser"
            - type: "null"
          description: "For direct conversations only. Null for groups."
        members:
          type: array
          items: { $ref: "#/components/schemas/ConversationMember" }
        lastMessage:
          oneOf:
            - $ref: "#/components/schemas/Message"
            - type: "null"
        unreadCount: { type: integer }
        backgroundUrl:
          type: ["string", "null"]
        updatedAt: { type: string, format: date-time }
      required: [id, kind, members, unreadCount, updatedAt]

    ConversationMember:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        avatarUrl:
          type: ["string", "null"]
        discriminator:
          type: ["string", "null"]
        lastSeenAt: { type: string, format: date-time }
        joinedAt: { type: string, format: date-time }
      required: [id, username, displayName, lastSeenAt, joinedAt]

    CreateGroupConversationBody:
      type: object
      properties:
        userIds:
          type: array
          items: { type: string }
          minItems: 2
          maxItems: 9
        title:
          type: ["string", "null"]
      required: [userIds]

    RenameConversationBody:
      type: object
      properties:
        title:
          type: ["string", "null"]
      required: [title]

    AddConversationMembersBody:
      type: object
      properties:
        userIds:
          type: array
          items: { type: string }
          minItems: 1
      required: [userIds]

    SetBackgroundBody:
      type: object
      properties:
        backgroundUrl: { type: string }
      required: [backgroundUrl]

    UserPhoto:
      type: object
      properties:
        id: { type: integer }
        userId: { type: string }
        imageUrl: { type: string }
        caption:
          type: ["string", "null"]
        createdAt: { type: string, format: date-time }
      required: [id, userId, imageUrl, createdAt]

    AddPhotoBody:
      type: object
      properties:
        imageUrl: { type: string }
        caption:
          type: ["string", "null"]
      required: [imageUrl]

    UploadUrlRequest:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        size: { type: integer, minimum: 1 }
        contentType: { type: string, minLength: 1 }
      required: [name, size, contentType]

    UploadUrlResponse:
      type: object
      properties:
        uploadURL: { type: string, format: uri }
        objectPath: { type: string }
        metadata: { $ref: "#/components/schemas/UploadUrlRequest" }
      required: [uploadURL, objectPath]

    InitiateCallBody:
      type: object
      properties:
        kind: { type: string, enum: [voice, video] }
        conversationId:
          type: ["integer", "null"]
        roomTag:
          type: ["string", "null"]
      required: [kind]

    Call:
      type: object
      properties:
        id: { type: integer }
        initiatorId: { type: string }
        kind: { type: string }
        status: { type: string }
        conversationId:
          type: ["integer", "null"]
        roomTag:
          type: ["string", "null"]
        startedAt: { type: string, format: date-time }
        endedAt:
          type: ["string", "null"]
          format: date-time
        participants:
          type: array
          items: { $ref: "#/components/schemas/CallParticipant" }
      required: [id, initiatorId, kind, status, startedAt, participants]

    CallParticipant:
      type: object
      properties:
        userId: { type: string }
        username: { type: string }
        displayName: { type: string }
        avatarUrl:
          type: ["string", "null"]
        state: { type: string }
        joinedAt:
          type: ["string", "null"]
          format: date-time
      required: [userId, username, displayName, state]

    CallSignalBody:
      type: object
      properties:
        toUserId: { type: string }
        kind: { type: string, enum: [offer, answer, ice] }
        payload: { type: string }
      required: [toUserId, kind, payload]

    CallSignal:
      type: object
      properties:
        id: { type: integer }
        callId: { type: integer }
        fromUserId: { type: string }
        toUserId: { type: string }
        kind: { type: string }
        payload: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, callId, fromUserId, toUserId, kind, payload, createdAt]

    CallSignalList:
      type: object
      properties:
        signals:
